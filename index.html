<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vehicle Registration — The Base Camp Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root { --teal: #006766; --teal2: #005555; --border: #E0DED8; --bg: #F2F1ED; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); font-family: 'DM Sans', -apple-system, sans-serif; background: #F2F1ED; color: #1A1A1A; }
    .wrap { max-width: 600px; margin: 0 auto; padding: 32px 20px 60px; }
    .logo { display: block; height: 60px; width: auto; margin: 0 auto 24px; }
    h1 { font-size: 32px; font-weight: 400; text-align: center; line-height: 1.1; margin-bottom: 8px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.06em; }
    .sub { text-align: center; color: #555; font-size: 15px; margin-bottom: 6px; }
    .disclaimer { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; font-size: 13px; color: #555; line-height: 1.6; text-align: center; margin: 20px 0 28px; }
    .form-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 28px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-weight: 700; font-size: 15px; margin-bottom: 8px; }
    .req { color: #e53935; }
    .field input, .field select {
      width: 100%; padding: 14px 16px; border: 1.5px solid #d0d0d0; border-radius: 10px;
      font-size: 16px; font-family: inherit; outline: none; background: #fff; transition: .15s;
    }
    .field input:focus, .field select:focus { border-color: var(--teal, #006766); box-shadow: 0 0 0 3px rgba(0,103,102,.1); }
    .field input[name="vehicleReg"] { text-transform: uppercase; font-family: monospace; font-size: 18px; font-weight: 700; letter-spacing: 0.1em; }
    .btn { width: 100%; padding: 16px; background: var(--teal, #006766); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; transition: .15s; }
    .btn:hover { background: #005555; }
    .btn:disabled { opacity: .6; cursor: default; }
    .error { color: #e53935; font-size: 13px; margin-top: 8px; display: none; }
    .success { display: none; text-align: center; padding: 40px 20px; }
    .success-icon { font-size: 56px; margin-bottom: 16px; }
    .success h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; color: #006766; }
    .success p { color: #555; font-size: 15px; line-height: 1.6; }
    .success-detail { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px 24px; text-align: left; font-size: 14px; line-height: 2; margin: 20px 0; }
    .success-detail div span:first-child { font-weight: 700; color: #1A1A1A; margin-right: 6px; }
    .success-detail div span:last-child { color: #555; }
    .loading { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
    .not-found { text-align: center; padding: 60px 20px; }
    .not-found h2 { font-size: 20px; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  <img src="https://pub-3e81d3d6e43444f19a79eb95fb50622b.r2.dev/base-camp-logo.png" 
       onerror="this.src='https://jamesplayer85.github.io/980-gwr-signin/assets/base-camp-logo-clean.png'"
       alt="The Base Camp Co." class="logo">

  <div id="loadingView" class="loading">Loading form…</div>
  <div id="notFoundView" class="not-found" style="display:none;">
    <h2>Form not found</h2>
    <p style="color:#888;">This vehicle registration link is invalid or has expired.</p>
  </div>

  <div id="formView" style="display:none;">
    <h1 id="formSite"></h1>
    <p class="sub" id="formProduction"></p>
    <p class="sub" id="formDates" style="font-size:13px;color:#888;margin-top:2px;"></p>
    <div class="disclaimer" id="formDisclaimer"></div>
    <div class="form-card">
      <div class="field">
        <label for="name">Name <span class="req">*</span></label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>
      <div class="field">
        <label for="vehicleReg">Vehicle Registration <span class="req">*</span></label>
        <input type="text" id="vehicleReg" name="vehicleReg" autocomplete="off" required placeholder="e.g. LF74 PYR">
      </div>
      <div class="field">
        <label for="dateOfEntry">Date of Entry <span class="req">*</span></label>
        <input type="date" id="dateOfEntry" required>
      </div>
      <div class="field" id="parkingAreaField" style="display:none;">
        <label for="parkingArea">Parking Area</label>
        <select id="parkingArea">
          <option value="">Select area…</option>
        </select>
      </div>
      <div id="submitError" class="error"></div>
      <button class="btn" id="submitBtn" onclick="submitForm()">Register vehicle</button>
    </div>
  </div>

  <div id="successView" class="success">
    <div class="success-icon">✅</div>
    <h2>Thank you for your submission</h2>
    <p>Your vehicle has been registered for <strong id="successSite"></strong>.</p>
    <div class="success-detail">
      <div><span>Name:</span><span id="successName"></span></div>
      <div><span>Vehicle Reg:</span><span id="successReg"></span></div>
      <div><span>Date of Entry:</span><span id="successDate"></span></div>
      <div id="successParkingRow" style="display:none;"><span>Parking Area:</span><span id="successParking"></span></div>
    </div>
    <p style="color:#888;font-size:13px;">If you have any issues on site please speak to The Base Camp Co. team.</p>
  </div>
</div>

<script>
const WORKER_URL = 'https://basecamp-proxy.bt7frcbfh2.workers.dev';

function fmtDate(d) {
  var p = d.split('-').map(Number);
  return new Intl.DateTimeFormat('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(new Date(p[0],p[1]-1,p[2],12));
}

var formData = null;

async function init() {
  var params = new URLSearchParams(location.search);
  var ref    = params.get('ref');
  if (!ref) { show('notFoundView'); return; }
  try {
    var res  = await fetch(WORKER_URL + '/v2/vreg/get?ref=' + encodeURIComponent(ref));
    var data = await res.json();
    if (!data.ok || !data.form) { show('notFoundView'); return; }
    formData = data.form;
    document.getElementById('formSite').textContent       = data.form.site + '\nVehicle Registration';
    document.getElementById('formProduction').textContent = 'Production: ' + data.form.production;
    if (data.form.startDate || data.form.endDate) {
      document.getElementById('formDates').textContent = 'Crew Parking Dates: ' + (data.form.startDate||'') + (data.form.endDate ? ' – ' + data.form.endDate : '');
    }
    // Default the date picker to today
    var dateInput = document.getElementById('dateOfEntry');
    dateInput.value = new Date().toISOString().slice(0,10);
    // Best-effort min/max if the admin's start/end text happens to parse as real dates
    var startParsed = new Date(data.form.startDate);
    var endParsed   = new Date(data.form.endDate);
    if (!isNaN(startParsed)) dateInput.min = startParsed.toISOString().slice(0,10);
    if (!isNaN(endParsed))   dateInput.max = endParsed.toISOString().slice(0,10);
    // Parking areas
    if (data.form.parkingAreas && data.form.parkingAreas.length) {
      var pa = document.getElementById('parkingArea');
      data.form.parkingAreas.forEach(function(a) {
        var opt = document.createElement('option'); opt.value = a; opt.textContent = a; pa.appendChild(opt);
      });
      document.getElementById('parkingAreaField').style.display = 'block';
    }
    document.getElementById('formDisclaimer').textContent = data.form.disclaimer ||
      'Please fill in the form below to register your vehicle on site. Make sure to log your vehicle when arriving on site or ahead of arrival each day. It is the responsibility of the production to ensure all vehicles are logged each day including unit cars and minibuses, deliveries, taxis etc. Failure to register vehicles will result in PCN charges being issued.';
    show('formView');
  } catch(e) { show('notFoundView'); }
}

function show(id) {
  ['loadingView','notFoundView','formView','successView'].forEach(function(v) {
    document.getElementById(v).style.display = v === id ? '' : 'none';
  });
}

async function submitForm() {
  var name       = document.getElementById('name').value.trim();
  var vehicleReg = document.getElementById('vehicleReg').value.trim().toUpperCase();
  var dateOfEntry= document.getElementById('dateOfEntry').value;
  var parkingArea= document.getElementById('parkingArea').value;
  var errorEl    = document.getElementById('submitError');
  errorEl.style.display = 'none';
  if (!name || !vehicleReg || !dateOfEntry) {
    errorEl.textContent = 'Please fill in all required fields.';
    errorEl.style.display = 'block';
    return;
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Registering…';
  try {
    var params = new URLSearchParams(location.search);
    var res = await fetch(WORKER_URL + '/v2/vreg/submit', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ref: params.get('ref'), name, vehicleReg, dateOfEntry, parkingArea })
    });
    var data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Submission failed');
    document.getElementById('successSite').textContent = formData.site;
    document.getElementById('successName').textContent = name;
    document.getElementById('successReg').textContent  = vehicleReg;
    document.getElementById('successDate').textContent = fmtDate(dateOfEntry);
    if (parkingArea) {
      document.getElementById('successParking').textContent = parkingArea;
      document.getElementById('successParkingRow').style.display = '';
    }
    show('successView');
  } catch(e) {
    errorEl.textContent = e.message || 'Submission failed. Please try again.';
    errorEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Register vehicle';
  }
}

init();
</script>
</body>
</html>
